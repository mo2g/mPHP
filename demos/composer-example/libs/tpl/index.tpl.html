<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!--# echo $title #--></title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 3rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #e94560, #0f3460, #53d8fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .version {
            color: #888;
            margin-bottom: 2rem;
        }
        .features {
            list-style: none;
            text-align: left;
            margin: 1rem auto;
            max-width: 400px;
        }
        .features li {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .features li::before {
            content: '✦ ';
            color: #e94560;
        }
        a {
            color: #53d8fb;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
        .links { margin-top: 2rem; }
        .links a { margin: 0 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1><!--# echo $title #--></h1>
        <p class="version">Running on PHP <!--# echo $version #--></p>
        <ul class="features">
            <!--# foreach($features as $feature) { #-->
            <li><!--# echo $feature #--></li>
            <!--# } #-->
        </ul>
        <div class="links">
            <a href="?c=index&a=api">API Demo →</a>
            <a href="https://github.com/mo2g/mPHP" target="_blank">GitHub →</a>
        </div>
    </div>
</body>
</html>
